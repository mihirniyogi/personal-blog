# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: mihirniyogi/personal-blog
  branch: main

publish_mode: simple

# these global settings are to avoid CMS errors; collections should override this.
media_folder: static/uploads
public_folder: /uploads

collections:
  - name: post
    label: "Public Post"
    folder: "content/post"
    path: "{{year}}-{{month}}-{{day}}-{{slug}}/index"
    media_folder: ""
    public_folder: ""
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Drink of the Day", name: "drink", widget: "markdown", required: false }
      - { label: "Song of the Day", name: "song", widget: "markdown", required: false }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Categories", name: "categories", widget: "list", required: false, field: { widget: "string" } }
      - { label: "Tags", name: "tags", widget: "list", required: false, field: { widget: "string" } }
      - { label: "Series", name: "series", widget: "list", required: false, field: { widget: "string" } }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Date", name: "date", widget: "datetime" }

  - name: private-post
    label: "🔒 Private Post"
    folder: "content/private"
    path: "{{year}}-{{month}}-{{day}}-{{slug}}/index"
    media_folder: ""
    public_folder: ""
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Categories", name: "categories", widget: "list", required: false, field: { widget: "string" } }
      - { label: "Tags", name: "tags", widget: "list", required: false, field: { widget: "string" } }
      - { label: "Series", name: "series", widget: "list", required: false, field: { widget: "string" } }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Date", name: "date", widget: "datetime" }
