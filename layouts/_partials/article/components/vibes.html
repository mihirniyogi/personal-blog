{{ if or .Params.drink .Params.song }}
<div class="post-vibes-container">
    {{ if .Params.drink }}
    <div class="vibe-block">
        <span class="vibe-block__icon" aria-hidden="true">🍵</span>
        <div class="vibe-block__body">
            <span class="vibe-block__label">Drink of the day</span>
            <span class="vibe-block__value">{{ .Params.drink | markdownify }}</span>
        </div>
    </div>
    {{ end }}

    {{ if .Params.song }}
    <div class="vibe-block">
        <span class="vibe-block__icon" aria-hidden="true">🎵</span>
        <div class="vibe-block__body">
            <span class="vibe-block__label">Song of the day</span>
            <span class="vibe-block__value">{{ .Params.song | markdownify }}</span>
        </div>
    </div>
    {{ end }}
</div>
{{ end }}
