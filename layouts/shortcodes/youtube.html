{{- $id := or (.Get "id") (.Get 0) -}}
<div class="video-embed">
  <iframe
    src="https://www.youtube.com/embed/{{ $id }}"
    loading="lazy"
    allowfullscreen
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    title="YouTube video"></iframe>
</div>
